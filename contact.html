<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak - NEXUS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white py-24 px-8">
    <div class="max-w-4xl mx-auto grid md:grid-cols-2 gap-16">
        <div>
            <h1 class="text-5xl font-black mb-8">Mari Bicara.</h1>
            <p class="text-xl text-gray-500 mb-12">Punya ide luar biasa? Kami siap membantu mewujudkannya.</p>
            <div class="space-y-4">
                <p class="font-bold">Email: hello@nexus.com</p>
                <p class="font-bold">WhatsApp: +62 812 3456 7890</p>
            </div>
        </div>
        <form class="space-y-4">
            <input type="text" placeholder="Nama" class="w-full bg-gray-50 border-none rounded-2xl px-6 py-4 focus:ring-2 focus:ring-indigo-600 outline-none">
            <input type="email" placeholder="Email" class="w-full bg-gray-50 border-none rounded-2xl px-6 py-4 focus:ring-2 focus:ring-indigo-600 outline-none">
            <textarea placeholder="Pesan Anda" rows="5" class="w-full bg-gray-50 border-none rounded-2xl px-6 py-4 focus:ring-2 focus:ring-indigo-600 outline-none"></textarea>
            <button class="w-full bg-gray-900 text-white font-bold py-4 rounded-2xl hover:bg-black transition">Kirim Pesan</button>
        </form>
    </div>
</body>
</html>
